<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button>
          <div class="navicon"></div>
        </button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg">
            <div class="lang-toggle">
              <a>
              <select id="masthead-lang" class="lang-toggle__select" data-lang-switcher aria-label="Select language">
                <option value="en">English</option>
                <option value="zh">中文</option>
                <option value="ja">日本語</option>
              </select>
              </a>
            </div>
          </li>
          {% for link in site.data.navigation.main %}
          <li class="masthead__menu-item">
            <a href="{{ domain }}{{ link.url }}">
              <span lang="en">{{ link.title.en | default: link.title }}</span>
              <span lang="zh">{{ link.title.zh | default: link.title }}</span>
              <span lang="ja">{{ link.title.ja | default: link.title.en | default: link.title }}</span>
            </a>
          </li>
          {% endfor %}

        </ul>
        <ul class="hidden-links hidden"></ul>

      </nav>
    </div>
  </div>
</div>
